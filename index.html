    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        glass: {
                            100: 'rgba(255, 255, 255, 0.1)',
                            200: 'rgba(255, 255, 255, 0.2)',
                            300: 'rgba(255, 255, 255, 0.3)',
                            dark: 'rgba(15, 23, 42, 0.6)',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Roboto Mono', 'monospace'],
                    },
                    animation: {
                        'blob': 'blob 10s infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'pulse-glow': 'pulse-glow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        'pulse-glow': {
                            '0%, 100%': { opacity: 1, boxShadow: '0 0 25px currentColor' },
                            '50%': { opacity: .8, boxShadow: '0 0 10px currentColor' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Animated Mesh Gradient Background */
        body {
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            min-height: 100vh;
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        
        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            border-left: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-card:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.1));
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 40px 0 rgba(0, 0, 0, 0.4);
        }

        /* --- Goal Post Card Styling --- */
        .goal-post-card {
            border-top: 6px solid rgba(255, 255, 255, 0.9);
            border-left: 3px solid rgba(255, 255, 255, 0.3);
            border-right: 3px solid rgba(255, 255, 255, 0.3);
            border-bottom: none;
            border-radius: 12px 12px 4px 4px;
            background-color: rgba(255, 255, 255, 0.02);
            background-image: 
                linear-gradient(30deg, rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(150deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6), inset 0 10px 20px -10px rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .goal-post-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(to right, #22c55e, #15803d);
            opacity: 0.8;
        }

        .goal-post-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            background-color: rgba(255, 255, 255, 0.05);
            border-top-color: #fff;
        }

        /* Unique Stage Styles */
        .card-qf {
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.15), rgba(88, 28, 135, 0.3));
            border-color: rgba(168, 85, 247, 0.3);
            box-shadow: 0 0 25px rgba(147, 51, 234, 0.1);
        }
        .card-sf {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.15), rgba(157, 23, 77, 0.3));
            border-color: rgba(236, 72, 153, 0.3);
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.15);
        }

        /* Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { height: 10px; width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; border: 2px solid transparent; background-clip: content-box; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.4); }

        /* Animation Canvas */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.6; }

        /* Smooth Transitions */
        .view-section { display: none; opacity: 0; transition: opacity 0.5s ease-in-out; }
        .view-section.active { display: block; opacity: 1; }
        
        .team-name { max-width: 140px; }
        
        /* Vertical Bracket Flow */
        .bracket-stage { position: relative; }
        .bracket-stage::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: 50%;
            width: 2px;
            height: 30px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
            transform: translateX(-50%);
        }
        .bracket-stage:last-child::after { display: none; }
    </style>
</head>
<body class="text-slate-100 font-sans overflow-x-hidden w-full selection:bg-pink-500/30 flex flex-col min-h-screen">

        // --- View Logic ---
        function switchView(viewName, filterQuery = null, updateHistory = true) {
            document.querySelectorAll('.view-section').forEach(el => {
                el.classList.add('hidden');
                el.classList.remove('active');
            });
            
            const target = document.getElementById(`view-${viewName}`);
            target.classList.remove('hidden');
            requestAnimationFrame(() => target.classList.add('active'));
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if(btn.dataset.view === viewName) {
                    btn.classList.add('bg-white/20', 'text-white', 'shadow-inner');
                    btn.classList.remove('text-slate-300', 'hover:bg-white/10');
                } else {
                    btn.classList.remove('bg-white/20', 'text-white', 'shadow-inner');
                    btn.classList.add('text-slate-300', 'hover:bg-white/10');
                }
            });

            if(viewName === 'fixtures') {
                const searchInput = document.getElementById('fixture-search');
                if(filterQuery) {
                    searchInput.value = filterQuery;
                    filterFixtures();
                } else if (!searchInput.value) {
                    filterFixtures(); 
                }
            }

            if (updateHistory) {
                const url = new URL(window.location);
                url.searchParams.set('view', viewName);
                if (filterQuery) url.searchParams.set('q', filterQuery);
                else url.searchParams.delete('q');
                history.pushState({}, '', url);
            }

            updateShareLinks();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateShareLinks() {
            const currentUrl = encodeURIComponent(window.location.href);
            const text = encodeURIComponent("Check out the World Cup 2026 Schedule!");
            
            document.getElementById('share-wa').href = `https://wa.me/?text=${text}%20${currentUrl}`;
            document.getElementById('share-li').href = `https://www.linkedin.com/sharing/share-offsite/?url=${currentUrl}`;
            document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${currentUrl}`;
            document.getElementById('share-tw').href = `https://twitter.com/intent/tweet?text=${text}&url=${currentUrl}`;
        }

        window.addEventListener('popstate', (event) => {
            const params = new URLSearchParams(window.location.search);
            const view = params.get('view') || 'groups';
            const query = params.get('q') || null;
            switchView(view, query, false);
        });

            let filtered = formattedFixtures.filter(m =>

                m.t2.n.toLowerCase().includes(query) || 
                m.venue.toLowerCase().includes(query) || 
                `group ${m.group.toLowerCase()}`.includes(query)
            );

            // Apply Favorites Filter
            if (showFavoritesOnly && favorites.length > 0) {
                filtered = filtered.filter(m => 
                    favorites.includes(m.t1.n) || favorites.includes(m.t2.n)
                );
            } else if (showFavoritesOnly && favorites.length === 0) {
                filtered = []; // No favorites selected
            }

            renderFixturesTable(filtered);

                    <div class="flex flex-col items-center gap-12">
                        <div class="animate-bounce-slow hover:pause w-full flex justify-center px-4">${createMatchCard(matches[104], true)}</div>
                        <div class="opacity-70 hover:opacity-100 transition-opacity w-full flex flex-col items-center">
                            <h4 class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-2">3rd Place</h4>
                            <div class="w-full max-w-lg mx-auto px-4">${createMatchCard(matches[103])}</div>
                        </div>
                    </div>
                </div>
            `;

            root.innerHTML = html;
            lucide.createIcons();
        }

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        const ballImage = new Image();
        const svgString = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><circle cx="256" cy="256" r="256" fill="white"/><path fill="black" d="M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zm0-464c23.6 0 46.3 3.6 67.6 10.1L272 173.6l-89.8 65.3L96.6 179.8C127.3 99.6 203.9 48 256 48zm121.7 41.6c43.1 36.3 73.3 87.6 82.8 145.7l-98.9 43.9-63.2-113.6 79.3-76zM134.3 90.6l78.1 75.3-64.4 114.7-98-45.7C60.2 176.7 90.5 125.7 134.3 90.6zM48 256c0-12.7 1.6-25 4.6-36.8l98.3 45.9 8 131.2-96.6 42.9C52.7 398.9 48 354.3 48 256zm144.1 161.2l-7.5-122.9 101.4-73.7 102.5 72.5-6.3 124.1L256 464l-63.9-46.8zm117.8 23.4l6.9-136 99.8-44.4c2.6 10.9 4.1 22.3 4.1 33.9 0 98.4-44.8 183.1-110.8 229.4l-93-45.9c32.7-7.9 62.6-20.9 89.2-37zm-89.2-37l-93 45.9C63.9 392.1 48 307.4 48 209c0-11.6 1.5-23 4.1-33.9l99.8 44.4 6.9 136z"/></svg>`;
        ballImage.src = 'data:image/svg+xml;base64,' + btoa(svgString);
        let balls = [];

        class Ball {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.size = Math.random() * 20 + 15; 
                this.speedX = (Math.random() - 0.5) * 1.5;
                this.speedY = (Math.random() - 0.5) * 1.5;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.05;
                this.opacity = Math.random() * 0.3 + 0.1;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY; this.rotation += this.rotSpeed;
                if (this.x < -50) this.x = window.innerWidth + 50;
                if (this.x > window.innerWidth + 50) this.x = -50;
                if (this.y < -50) this.y = window.innerHeight + 50;
                if (this.y > window.innerHeight + 50) this.y = -50;
            }
            draw() {
                if (!ballImage.complete || ballImage.naturalWidth === 0) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;
                ctx.drawImage(ballImage, -this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            balls.forEach(b => { b.update(); b.draw(); });
            requestAnimationFrame(animate);
        }

        document.addEventListener('DOMContentLoaded', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<15; i++) balls.push(new Ball());
            animate();
            
            renderGroups();
            renderFixturesTable(formattedFixtures); 
            renderBracket();
            updateShareLinks(); // Initial share link setup
            
            const params = new URLSearchParams(window.location.search);
            const initialView = params.get('view') || 'groups';
            const initialFilter = params.get('q');
            switchView(initialView, initialFilter, false);

            document.getElementById('mobile-menu-btn').onclick = () => document.getElementById('mobile-menu').classList.toggle('hidden');
            window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        });
    </script>
