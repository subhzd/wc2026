        /* Dynamic Themed Background Variables */
        :root {
            --bg-color: #f8fafc;
            --grad-1: rgba(147, 197, 253, 0.5);
            --grad-2: rgba(216, 180, 254, 0.5);
            --grad-3: rgba(249, 168, 212, 0.5);
        }
        
        .dark {
            --bg-color: #0f172a;
            --grad-1: hsla(253,16%,7%,1);
            --grad-2: hsla(225,39%,30%,1);
            --grad-3: hsla(339,49%,30%,1);
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, var(--grad-1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, var(--grad-2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, var(--grad-3) 0, transparent 50%);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
        }
        .dark .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        .card-qf { box-shadow: 0 0 20px rgba(147, 51, 234, 0.1); border-color: rgba(147, 51, 234, 0.3); }
        .card-sf { box-shadow: 0 0 20px rgba(236, 72, 153, 0.1); border-color: rgba(236, 72, 153, 0.3); }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: 0.4; }
        .dark #bg-canvas { opacity: 0.6; }

        .view-section { display: none; opacity: 0; transition: opacity 0.4s ease-in-out; }
        .view-section.active { display: block; opacity: 1; }

        .bracket-stage { position: relative; }
        .bracket-stage::after {
            content: ''; position: absolute; bottom: -30px; left: 50%;
            width: 2px; height: 30px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), transparent);
            transform: translateX(-50%);
        }
        .dark .bracket-stage::after { background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent); }
        .bracket-stage:last-child::after { display: none; }
        
        .sort-header { cursor: pointer; user-select: none; transition: color 0.2s; }
        .sort-header:hover { color: #3b82f6; } 
        .dark .sort-header:hover { color: #60a5fa; } 
        /* Favorite Match Row Highlight */
        .row-favorite { background-color: rgba(244, 114, 182, 0.1); border-left: 4px solid #ec4899; }
        .dark .row-favorite { background-color: rgba(236, 72, 153, 0.15); border-left: 4px solid #f472b6; }
    </style>

        <div class="absolute -bottom-32 left-1/3 w-96 h-96 bg-pink-400/30 dark:bg-pink-500/20 rounded-full mix-blend-multiply filter blur-3xl animate-blob" style="animation-delay: 4s"></div>

            <div class="flex items-center justify-between h-14">
                <!-- Brand -->
                <div class="flex items-center gap-3 cursor-pointer group" onclick="switchView('groups')">
                    <div class="relative w-7 h-7 flex items-center justify-center bg-white/50 dark:bg-white/10 rounded-md border border-slate-200 dark:border-white/20 shadow-sm dark:shadow-lg group-hover:scale-110 transition-transform duration-300 backdrop-blur-md overflow-hidden">
                        <!-- App Icon fixed -->
                        <img src="fifa2026.png" alt="WC" class="w-full h-full object-contain" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden')">
                        <i data-lucide="trophy" class="w-4 h-4 text-yellow-500 dark:text-yellow-400 hidden"></i>
                    </div>
                    <span class="text-lg font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600 dark:from-blue-400 dark:via-purple-400 dark:to-pink-400">
                        WC 2026
                    </span>
                </div>

                <!-- Center Nav Pills -->
                <div class="hidden md:flex bg-slate-200/50 dark:bg-black/20 p-1 rounded-full border border-slate-300/50 dark:border-white/10 backdrop-blur-md transition-colors">
                    <button onclick="switchView('groups')" class="nav-btn px-4 py-1 rounded-full text-[11px] font-bold transition-all duration-300 bg-white dark:bg-white/20 text-blue-600 dark:text-white shadow-sm" data-view="groups">Groups</button>
                    <button onclick="switchView('fixtures')" class="nav-btn px-4 py-1 rounded-full text-[11px] font-bold transition-all duration-300 hover:bg-white/50 dark:hover:bg-white/10 text-slate-600 dark:text-slate-300" data-view="fixtures">Matches</button>
                    <button onclick="switchView('bracket')" class="nav-btn px-4 py-1 rounded-full text-[11px] font-bold transition-all duration-300 hover:bg-white/50 dark:hover:bg-white/10 text-slate-600 dark:text-slate-300" data-view="bracket">Knockout</button>
                </div>
                
                <!-- Right Controls -->
                <div class="flex items-center gap-3">
                    <div class="hidden sm:flex items-center gap-1.5 text-[10px] font-bold px-2 py-1 bg-slate-100 dark:bg-slate-800 rounded-lg text-slate-500 dark:text-slate-400">

                        <i id="theme-icon-moon" data-lucide="moon" class="w-4 h-4 block dark:hidden"></i>
                    </button>
                    <button id="mobile-menu-btn" class="md:hidden p-1.5 rounded-lg hover:bg-slate-200 dark:hover:bg-white/10 text-slate-800 dark:text-white transition-colors">

                    </button>
                </div>
            </div>
        </div>
        
        <!-- Mobile Menu -->

                <button onclick="switchView('groups'); document.getElementById('mobile-menu').classList.add('hidden');" class="w-full text-left p-3 rounded-lg text-sm font-bold hover:bg-slate-100 dark:hover:bg-white/10 text-slate-800 dark:text-slate-200">Groups</button>
                <button onclick="switchView('fixtures'); document.getElementById('mobile-menu').classList.add('hidden');" class="w-full text-left p-3 rounded-lg text-sm font-bold hover:bg-slate-100 dark:hover:bg-white/10 text-slate-800 dark:text-slate-200">Matches</button>

            <a id="share-tw" href="#" target="_blank" class="text-slate-400 hover:text-[#1DA1F2] transition-transform hover:scale-110">
                <svg class="w-3.5 h-3.5 fill-current" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.901 1.153h3.68l-8.04 9.19L24 22.846h-7.406l-5.8-7.584-6.638 7.584H.474l8.6-9.83L0 1.154h7.594l5.243 6.932ZM17.61 20.644h2.039L6.486 3.24H4.298Z"/></svg>
            </a>
        </div>
    </footer>

    <script>
        // ==========================================
        // DATA PROCESSING & TIMEZONE HELPERS
        // ==========================================
        
        const appData = JSON.parse(document.getElementById('wc-data').textContent);
        const groupsData = appData.groups;
        let formattedFixtures = [];
        
        // Helper: Convert UTC time to User's Local Time
        function formatLocal(isoString) {
            const date = new Date(isoString);
            const formattedDate = date.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
            const formattedTime = date.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
            const timeZoneStr = date.toLocaleTimeString(undefined, { timeZoneName: 'short' }).split(' ').pop();
            return {
                full: `${formattedDate} • ${formattedTime} ${timeZoneStr}`,
                dateOnly: formattedDate,
                timeOnly: formattedTime,
                tz: timeZoneStr
            };
        }

        document.getElementById('user-timezone').textContent = Intl.DateTimeFormat().resolvedOptions().timeZone.split('/').pop().replace('_', ' ');

        // Process group matches
        appData.fixtures.forEach(f => {
            const team1 = groupsData.flatMap(g => g.teams).find(t => t.n.includes(f.t1) || f.t1.includes(t.n)) || {n: f.t1, c: f.t1.substring(0,3).toUpperCase(), f: 'un'};
            const team2 = groupsData.flatMap(g => g.teams).find(t => t.n.includes(f.t2) || f.t2.includes(t.n)) || {n: f.t2, c: f.t2.substring(0,3).toUpperCase(), f: 'un'};
            const localTiming = formatLocal(f.datetime);
            
            formattedFixtures.push({
                ...f, 
                t1: team1, 
                t2: team2,
                localDate: localTiming.full,
                searchDateStr: localTiming.full.toLowerCase()
            });
        });

        // ==========================================
        // COUNTDOWN TIMER
        // ==========================================
        const kickoffDate = new Date('2026-06-11T19:00:00Z').getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const distance = kickoffDate - now;
            
            if (distance < 0) {
                document.getElementById('countdown-text').innerHTML = "Tournament is Live!";
                return;
            }
            
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            document.getElementById('countdown-text').innerHTML = `Kickoff in: ${days}d ${hours}h ${minutes}m ${seconds}s`;
        }, 1000);

        // ==========================================
        // STATE & LOGIC
        // ==========================================
        let favorites = JSON.parse(localStorage.getItem('wc2026_favs')) || [];
        let showFavoritesOnly = false;
        let currentSort = { key: 'datetime', dir: 'asc' };

        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        function toggleFavorite(teamName) {
            if(favorites.includes(teamName)) favorites = favorites.filter(t => t !== teamName);
            else favorites.push(teamName);
            
            localStorage.setItem('wc2026_favs', JSON.stringify(favorites));
            renderGroups();
            filterFixtures(); 
            
            if(favorites.includes(teamName)) {
                confetti({ particleCount: 50, spread: 40, origin: { y: 0.6 }, colors: ['#ec4899'] });
            }
        }

        function toggleFavoritesFilter() {
            showFavoritesOnly = !showFavoritesOnly;
            const btn = document.getElementById('fav-filter-btn');
            const icon = document.getElementById('fav-filter-icon');
            
            if(showFavoritesOnly) {
                btn.classList.add('text-pink-500', 'bg-pink-100', 'dark:bg-pink-500/20', 'border-pink-300');
                icon.classList.add('fill-pink-500');
            } else {
                btn.classList.remove('text-pink-500', 'bg-pink-100', 'dark:bg-pink-500/20', 'border-pink-300');
                icon.classList.remove('fill-pink-500');
            }
            filterFixtures();
        }

        function sortFixtures(key) {
            currentSort.dir = (currentSort.key === key && currentSort.dir === 'asc') ? 'desc' : 'asc';
            currentSort.key = key;
            filterFixtures();
        }

        // ==========================================
        // RENDERING
        // ==========================================
        function renderGroups() {
            const container = document.getElementById('groups-container');
            container.innerHTML = groupsData.map((group, idx) => `
                <div class="glass-panel rounded-xl overflow-hidden transition-all hover:-translate-y-1 hover:shadow-xl dark:bg-slate-800/50">
                    <div class="px-4 py-3 border-b border-slate-200 dark:border-white/10 flex justify-between items-center bg-slate-50/50 dark:bg-white/5">
                        <div class="flex items-center gap-3">
                            <div class="w-6 h-6 rounded bg-gradient-to-br from-blue-500 to-indigo-600 text-white flex items-center justify-center font-black text-xs shadow-md">
                                ${group.id}
                            </div>
                            <span class="font-bold text-sm text-slate-800 dark:text-white">Group ${group.id}</span>
                        </div>
                        <button onclick="switchView('fixtures', 'Group ${group.id}')" class="text-[10px] font-bold text-blue-500 hover:text-blue-600 uppercase tracking-wider">Matches &rarr;</button>
                    </div>
                    <div class="p-0">
                        <table class="w-full text-left">
                            <thead class="bg-slate-100/50 dark:bg-black/20 text-[9px] uppercase font-bold text-slate-400">
                                <tr>
                                    <th class="px-3 py-2 w-full">Team</th>
                                    <th class="px-2 py-2 text-center" title="Played">P</th>
                                    <th class="px-2 py-2 text-center" title="Goal Difference">GD</th>
                                    <th class="px-3 py-2 text-center text-slate-800 dark:text-slate-200">Pts</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100 dark:divide-white/5 text-sm">
                                ${group.teams.map((team, i) => {
                                    const isFav = favorites.includes(team.n);
                                    return `
                                    <tr class="hover:bg-slate-50 dark:hover:bg-white/5 transition-colors group cursor-pointer ${isFav ? 'bg-pink-50/50 dark:bg-pink-900/10' : ''}" onclick="switchView('fixtures', '${team.n}')">
                                        <td class="px-3 py-2.5 flex items-center gap-2">
                                            <span class="text-slate-400 text-[10px] font-mono w-3">${i+1}</span>
                                            ${team.f !== 'un' ? `<span class="fi fi-${team.f} rounded-sm shadow-sm text-base"></span>` : `<i data-lucide="globe" class="w-4 h-4 text-slate-500"></i>`}
                                            <span class="font-semibold text-slate-700 dark:text-slate-200 truncate max-w-[100px] text-xs">${team.n}</span>
                                            <!-- Favorite icon: Always visible now -->
                                            <button onclick="event.stopPropagation(); toggleFavorite('${team.n}')" class="ml-auto transition-opacity p-1">
                                                <i data-lucide="heart" class="w-3 h-3 ${isFav ? 'fill-pink-500 text-pink-500' : 'text-slate-300 dark:text-slate-600 group-hover:text-pink-400'}"></i>
                                            </button>
                                        </td>
                                        <td class="px-2 py-2 text-center text-slate-500 text-xs font-mono">${team.p}</td>
                                        <td class="px-2 py-2 text-center text-slate-500 text-xs font-mono">${team.gd}</td>
                                        <td class="px-3 py-2 text-center font-bold text-slate-800 dark:text-white text-xs font-mono">${team.pts}</td>
                                    </tr>
                                `}).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderFixturesTable(list) {
            const tbody = document.getElementById('fixtures-body');
            const noResults = document.getElementById('no-results');
            
            if(list.length === 0) {
                tbody.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }
            
            noResults.classList.add('hidden');
            tbody.innerHTML = list.map(match => {
                const isFavMatch = favorites.includes(match.t1.n) || favorites.includes(match.t2.n);
                const rowClasses = isFavMatch ? 'row-favorite transition-colors' : 'hover:bg-slate-50 dark:hover:bg-white/5 transition-colors';
                
                return `
                <tr class="${rowClasses} border-b border-slate-100 dark:border-white/5 last:border-0">
                    <td class="py-3 px-3 text-center">
                        <span class="flex h-2 w-2 relative mx-auto">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                        </span>
                    </td>
                    <td class="py-3 px-4">
                        <div class="flex flex-col">
                            <span class="text-xs font-bold text-slate-800 dark:text-slate-200">${match.localDate.split('•')[0]}</span>
                            <span class="text-[10px] text-blue-600 dark:text-blue-400 font-mono font-medium">${match.localDate.split('•')[1]}</span>
                        </div>
                    </td>
                    <td class="py-3 px-4">
                        <span class="px-2 py-1 rounded bg-slate-100 dark:bg-white/10 text-slate-600 dark:text-slate-300 font-bold text-[10px]">
                            ${match.group}
                        </span>
                    </td>
                    <td class="py-3 px-4">
                        <div class="flex items-center justify-center gap-3">
                            <div class="flex items-center gap-2 justify-end w-1/2">
                                <span class="font-bold text-xs ${favorites.includes(match.t1.n) ? 'text-pink-600 dark:text-pink-400' : 'text-slate-700 dark:text-slate-200'}">${match.t1.n}</span>
                                ${match.t1.f !== 'un' ? `<span class="fi fi-${match.t1.f} rounded-sm shadow-sm text-sm border border-slate-200 dark:border-transparent"></span>` : ''}
                            </div>
                            <span class="text-slate-400 dark:text-slate-500 font-bold text-[10px] bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded">VS</span>
                            <div class="flex items-center gap-2 justify-start w-1/2">
                                ${match.t2.f !== 'un' ? `<span class="fi fi-${match.t2.f} rounded-sm shadow-sm text-sm border border-slate-200 dark:border-transparent"></span>` : ''}
                                <span class="font-bold text-xs ${favorites.includes(match.t2.n) ? 'text-pink-600 dark:text-pink-400' : 'text-slate-700 dark:text-slate-200'}">${match.t2.n}</span>
                            </div>
                        </div>
                    </td>
                    <td class="py-3 px-4 text-right text-[10px] text-slate-500 dark:text-slate-400 font-medium">
                        <div class="flex items-center justify-end gap-1">
                            <i data-lucide="map-pin" class="w-3 h-3"></i> ${match.venue}
                        </div>
                    </td>
                </tr>
            `}).join('');
            lucide.createIcons();
        }

        function filterFixtures() {
            const query = document.getElementById('fixture-search').value.toLowerCase();
            
            let filtered = formattedFixtures.filter(m => 
                m.t1.n.toLowerCase().includes(query) || 
                m.t2.n.toLowerCase().includes(query) || 
                m.venue.toLowerCase().includes(query) || 
                m.searchDateStr.includes(query) ||
                `group ${m.group.toLowerCase()}`.includes(query)
            );

            if (showFavoritesOnly) {
                filtered = filtered.filter(m => favorites.includes(m.t1.n) || favorites.includes(m.t2.n));
            }

            filtered.sort((a, b) => {
                let valA = a[currentSort.key];
                let valB = b[currentSort.key];
                
                if (currentSort.key === 'datetime') {
                    valA = new Date(a.datetime).getTime();
                    valB = new Date(b.datetime).getTime();
                } else if (currentSort.key === 'matchup') {
                    valA = a.t1.n; valB = b.t1.n;
                }

                if (valA < valB) return currentSort.dir === 'asc' ? -1 : 1;
                if (valA > valB) return currentSort.dir === 'asc' ? 1 : -1;
                return 0;
            });

            renderFixturesTable(filtered);
        }

        // --- BRACKET LOGIC ---
        function createMatchCard(match, isFinal = false) {
            // Fail-safe to prevent crash if JSON is malformed
            if (!match) return `<div class="glass-card w-full rounded-xl p-3 text-center text-xs text-red-500 border border-red-500/20">Data Loading Error</div>`;
            
            let specificStyle = 'glass-card';
            if (match.round === 'QF') specificStyle = 'card-qf'; 
            if (match.round === 'SF') specificStyle = 'card-sf'; 

            const finalStyle = isFinal ? 
                'w-full max-w-lg border-amber-400/50 bg-gradient-to-br from-amber-100 to-amber-50 dark:from-amber-900/40 dark:to-black/60 shadow-[0_0_50px_rgba(245,158,11,0.3)] z-30' : 
                `w-full ${specificStyle}`; 
            
            const timing = formatLocal(match.datetime);

            return `
                <div class="relative flex flex-col justify-between ${finalStyle} rounded-xl p-3 mb-0 group overflow-hidden transition-all duration-300 mx-auto">
                    <div class="flex justify-between items-center mb-2 border-b border-slate-200 dark:border-white/5 pb-2">
                        <span class="text-[9px] font-bold text-slate-500 dark:text-slate-400 uppercase flex items-center gap-1"><i data-lucide="clock" class="w-3 h-3 text-blue-500"></i> ${timing.dateOnly} • ${timing.timeOnly}</span>
                        <span class="text-[9px] text-slate-500 dark:text-slate-400">${match.venue}</span>
                    </div>
                    <div class="flex flex-col gap-1.5 relative z-10">
                        <div class="flex items-center justify-between px-2 py-1.5 bg-slate-100/50 dark:bg-black/20 rounded border border-slate-200 dark:border-white/5 transition-all">
                            <div class="flex items-center gap-2">
                                ${match.t1.f !== 'un' ? `<span class="fi fi-${match.t1.f} rounded-sm shadow-sm text-lg"></span>` : `<i data-lucide="shield-question" class="w-4 h-4 text-slate-400"></i>`}
                                <span class="text-xs font-bold text-slate-800 dark:text-white">${match.t1.n}</span>
                            </div>
                        </div>
                        <div class="flex items-center justify-between px-2 py-1.5 bg-slate-100/50 dark:bg-black/20 rounded border border-slate-200 dark:border-white/5 transition-all">
                            <div class="flex items-center gap-2">
                                ${match.t2.f !== 'un' ? `<span class="fi fi-${match.t2.f} rounded-sm shadow-sm text-lg"></span>` : `<i data-lucide="shield-question" class="w-4 h-4 text-slate-400"></i>`}
                                <span class="text-xs font-bold text-slate-800 dark:text-white">${match.t2.n}</span>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function renderBracket() {
            const root = document.getElementById('vertical-bracket-root');
            const kMatches = appData.knockout;

            // Updated stages array to explicitly use ALL full knockout matches
            const stages = [
                { title: 'Round of 32', ids: ['73','74','75','76','77','78','79','80','81','82','83','84','85','86','87','88'], cols: 'grid-cols-1 md:grid-cols-2 lg:grid-cols-4' },
                { title: 'Round of 16', ids: ['89','90','91','92','93','94','95','96'], cols: 'grid-cols-1 md:grid-cols-2 lg:grid-cols-4' },
                { title: 'Quarter Finals', ids: ['97','98','99','100'], cols: 'grid-cols-1 md:grid-cols-2' },
                { title: 'Semi Finals', ids: ['101','102'], cols: 'grid-cols-1 md:grid-cols-2' },
            ];

            let html = '';
            stages.forEach((stage) => {
                html += `
                    <div class="bracket-stage relative flex flex-col items-center">
                        <h3 class="text-center text-blue-600 dark:text-blue-300 font-black text-sm uppercase tracking-[0.2em] mb-4 drop-shadow-sm">${stage.title}</h3>
                        <div class="grid ${stage.cols} gap-4 w-full">
                            ${stage.ids.map(id => createMatchCard(kMatches[id])).join('')}
                        </div>
                    </div>
                `;
            });

            html += `
                <div class="bracket-stage relative pt-8 text-center">
                    <h3 class="text-center text-amber-500 dark:text-amber-400 font-black text-xl uppercase tracking-[0.2em] mb-6">World Cup Final</h3>
                    <div class="flex flex-col items-center gap-6">
                        <div class="w-full flex justify-center px-4">${createMatchCard(kMatches['104'], true)}</div>
                        <div class="opacity-70 w-full flex flex-col items-center">
                            <h4 class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-2">3rd Place Match</h4>
                            <div class="w-full max-w-sm mx-auto px-4">${createMatchCard(kMatches['103'])}</div>
                        </div>
                    </div>
                </div>
            `;

            root.innerHTML = html;
        }

        // --- NAVIGATION, HISTORY & SHARE LINKS ---
        function switchView(viewName, filterQuery = null, updateHistory = true) {
            document.querySelectorAll('.view-section').forEach(el => {
                el.classList.add('hidden'); el.classList.remove('active');
            });
            const target = document.getElementById(`view-${viewName}`);
            if(target) {
                target.classList.remove('hidden');
                setTimeout(() => target.classList.add('active'), 10);
            }
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if(btn.dataset.view === viewName) {
                    btn.className = "nav-btn px-4 py-1 rounded-full text-[11px] font-bold transition-all duration-300 bg-white dark:bg-white/20 text-blue-600 dark:text-white shadow-sm";
                } else {
                    btn.className = "nav-btn px-4 py-1 rounded-full text-[11px] font-bold transition-all duration-300 hover:bg-white/50 dark:hover:bg-white/10 text-slate-600 dark:text-slate-300";
                }
            });

            if(viewName === 'fixtures') {
                const searchInput = document.getElementById('fixture-search');
                if(filterQuery) searchInput.value = filterQuery;
                else if (!searchInput.value) searchInput.value = '';
                filterFixtures();
            }
            
            // Push Browser History State for Back/Forward navigation
            if (updateHistory) {
                const url = new URL(window.location);
                url.searchParams.set('view', viewName);
                if (filterQuery) url.searchParams.set('q', filterQuery);
                else url.searchParams.delete('q');
                history.pushState({ view: viewName, q: filterQuery }, '', url);
            }

            // Immediately update the share buttons to reflect the current page
            updateShareLinks();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateShareLinks() {
            const currentUrl = encodeURIComponent(window.location.href);
            const text = encodeURIComponent("Check out the World Cup 2026 Schedule & Bracket!");
            
            const waBtn = document.getElementById('share-wa');
            const fbBtn = document.getElementById('share-fb');
            const twBtn = document.getElementById('share-tw');
            
            if (waBtn) waBtn.href = `https://wa.me/?text=${text}%20${currentUrl}`;
            if (fbBtn) fbBtn.href = `https://www.facebook.com/sharer/sharer.php?u=${currentUrl}`;
            if (twBtn) twBtn.href = `https://twitter.com/intent/tweet?text=${text}&url=${currentUrl}`;
        }

        // Listener for Browser Back/Forward buttons
        window.addEventListener('popstate', (event) => {
            if (event.state) {
                switchView(event.state.view, event.state.q, false);
            } else {
                const params = new URLSearchParams(window.location.search);
                const view = params.get('view') || 'groups';
                const query = params.get('q') || null;
                switchView(view, query, false);
            }
        });

        // ==========================================
        // CANVAS ANIMATION
        // ==========================================
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        const ballImage = new Image();
        const svgString = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><circle cx="256" cy="256" r="256" fill="white"/><path fill="black" d="M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zm0-464c23.6 0 46.3 3.6 67.6 10.1L272 173.6l-89.8 65.3L96.6 179.8C127.3 99.6 203.9 48 256 48zm121.7 41.6c43.1 36.3 73.3 87.6 82.8 145.7l-98.9 43.9-63.2-113.6 79.3-76zM134.3 90.6l78.1 75.3-64.4 114.7-98-45.7C60.2 176.7 90.5 125.7 134.3 90.6zM48 256c0-12.7 1.6-25 4.6-36.8l98.3 45.9 8 131.2-96.6 42.9C52.7 398.9 48 354.3 48 256zm144.1 161.2l-7.5-122.9 101.4-73.7 102.5 72.5-6.3 124.1L256 464l-63.9-46.8zm117.8 23.4l6.9-136 99.8-44.4c2.6 10.9 4.1 22.3 4.1 33.9 0 98.4-44.8 183.1-110.8 229.4l-93-45.9c32.7-7.9 62.6-20.9 89.2-37zm-89.2-37l-93 45.9C63.9 392.1 48 307.4 48 209c0-11.6 1.5-23 4.1-33.9l99.8 44.4 6.9 136z"/></svg>`;
        ballImage.src = 'data:image/svg+xml;base64,' + btoa(svgString);
        let balls = [];

        class Ball {
            constructor() { this.init(); }
            init() {
                this.depth = Math.random() * 0.8 + 0.2; 
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.baseSize = (Math.random() * 15 + 10) * this.depth; 
                this.speedX = ((Math.random() - 0.5) * 1.5) * this.depth;
                this.speedY = ((Math.random() - 0.5) * 1.5) * this.depth;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = ((Math.random() - 0.5) * 0.04) * this.depth;
                this.opacity = (Math.random() * 0.2 + 0.05) * this.depth;
                this.waveOffset = Math.random() * Math.PI * 2;
                this.waveSpeed = Math.random() * 0.02 + 0.01;
            }
            update(time) {
                this.x += this.speedX; 
                this.y += this.speedY + Math.sin(time * this.waveSpeed + this.waveOffset) * 0.5 * this.depth; 
                this.rotation += this.rotSpeed;
                const bounds = this.baseSize + 50;
                if (this.x < -bounds) this.x = window.innerWidth + bounds;
                if (this.x > window.innerWidth + bounds) this.x = -bounds;
                if (this.y < -bounds) this.y = window.innerHeight + bounds;
                if (this.y > window.innerHeight + bounds) this.y = -bounds;
            }
            draw() {
                if (!ballImage.complete || ballImage.naturalWidth === 0) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;
                const renderSize = this.baseSize * 1.5; 
                ctx.drawImage(ballImage, -renderSize/2, -renderSize/2, renderSize, renderSize);
                ctx.restore();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            balls.sort((a,b) => a.depth - b.depth).forEach(b => { b.update(Date.now()*0.02); b.draw(); });
            requestAnimationFrame(animate);
        }

        // ==========================================
        // INIT
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            for(let i=0; i<25; i++) balls.push(new Ball());
            animate();
            
            if(showFavoritesOnly) toggleFavoritesFilter(); 
            
            // Build the UI
            renderGroups();
            renderFixturesTable(formattedFixtures); 
            renderBracket();
            
            // Read URL parameters on first load to respect shared links
            const params = new URLSearchParams(window.location.search);
            const initialView = params.get('view') || 'groups';
            const initialFilter = params.get('q');
            switchView(initialView, initialFilter, false); 
            
            // Generate valid Social Share Links based on default page
            updateShareLinks();
            
            // Finally generate all icons including newly created Share Buttons
            lucide.createIcons();
            
            document.getElementById('mobile-menu-btn').onclick = () => document.getElementById('mobile-menu').classList.toggle('hidden');
            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        });
    </script>
